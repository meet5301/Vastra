<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist - VASTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop.css" />
    <link rel="stylesheet" href="/css/navbar.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", Arial, sans-serif;
        background: radial-gradient(circle at 12% 12%, #fff3d9 0%, transparent 42%),
          radial-gradient(circle at 88% 18%, #f3efe6 0%, transparent 40%),
          linear-gradient(180deg, #fbfaf7 0%, #f3ede2 45%, #fbfaf7 100%);
        color: #111;
      }
      main h1 {
        text-align: center;
        margin: 30px 0 10px;
        font-weight: 900;
        letter-spacing: 3px;
        font-family: "Playfair Display", Georgia, serif;
      }
      .wishlist-container {
        width: 65%;
        margin: 40px auto 70px;
        background: rgba(255, 255, 255, 0.92);
        padding: 36px;
        display: block;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      }
      @media (max-width: 1024px) {
        .wishlist-container {
          width: 85%;
        }
      }
      @media (max-width: 768px) {
        .wishlist-container {
          width: 92%;
          padding: 20px;
        }
      }
      .wishlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.6rem;
        padding: 2rem 0;
      }
      @media (max-width: 480px) {
        .wishlist-grid {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
      }
      .wishlist-grid.is-empty {
        display: flex;
        justify-content: center;
      }
      .wishlist-grid.is-empty .empty-state {
        max-width: 480px;
      }
      .wishlist-item {
        border: 1px solid rgba(0, 0, 0, 0.06);
        padding: 1rem;
        text-align: center;
        position: relative;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      }
      .wishlist-item img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        margin-bottom: 1rem;
        border-radius: 10px;
      }
      .remove-wishlist {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #111;
        color: #fff;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        transition: background 0.2s;
      }
      .remove-wishlist:hover { background: #e63946; }
    </style>
  </head>

  <body>
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <main>
      <h1>MY WISHLIST</h1>

      <div class="container wishlist-container">
        <section class="content">
          <div class="wishlist-grid" id="wishlist-container"></div>
        </section>
      </div>
    </main>

    <script src="/js/toast.js"></script>
    <script>
      async function syncAndRenderWishlist() {
        const token = localStorage.getItem("vastra_token");
        // If logged in, sync API wishlist to localStorage
        if (token) {
          try {
            const res  = await fetch("/api/auth/me", { headers: { Authorization: `Bearer ${token}` } });
            const data = await res.json();
            if (data.success && data.user.wishlist) {
              const apiWishlist = data.user.wishlist.map((p) => ({
                id: p._id, name: p.name, price: p.price, image: p.image,
              }));
              localStorage.setItem("vastra_wishlist", JSON.stringify(apiWishlist));
            }
          } catch (_) {}
        }
        renderWishlist();
      }

      function renderWishlist() {
        const wishlist  = JSON.parse(localStorage.getItem("vastra_wishlist") || "[]");
        const container = document.getElementById("wishlist-container");
        container.classList.toggle("is-empty", wishlist.length === 0);
        if (wishlist.length === 0) {
          container.innerHTML = '<div class="empty-state"><h2>Your wishlist is empty</h2><a href="/shop" class="empty-state-link">Continue Shopping</a></div>';
          return;
        }
        container.innerHTML = wishlist.map((item) => `
          <div class="wishlist-item">
            <button class="remove-wishlist" onclick="removeFromWishlist('${item.id}')">✕</button>
            <img src="${item.image}" onerror="this.src='https://via.placeholder.com/250'" onclick="window.location.href='/detail?id=${item.id}'">
            <p style="font-weight:600;">${item.name}</p>
            <p style="color:#999;font-size:14px;">Rs. ${Math.round(Number(item.price || 0)).toLocaleString("en-IN")}</p>
            <button onclick="addToCart('${item.id}','${item.name}',${item.price},'${item.image}')" style="width:100%;padding:10px;background:#000;color:#fff;border:none;cursor:pointer;margin-top:8px;">ADD TO BAG</button>
          </div>`).join("");
      }

      async function removeFromWishlist(id) {
        const token = localStorage.getItem("vastra_token");
        if (token) {
          await fetch(`/api/auth/wishlist/${id}`, { method: "POST", headers: { Authorization: `Bearer ${token}` } });
        }
        let wishlist = JSON.parse(localStorage.getItem("vastra_wishlist") || "[]");
        localStorage.setItem("vastra_wishlist", JSON.stringify(wishlist.filter((item) => item.id !== id)));
        renderWishlist();
      }

      function addToCart(id, name, price, image) {
        addToCartShared(id, name, price, image);
      }

      syncAndRenderWishlist();
    </script>
    <script src="/js/footer.js"></script>
  </body>
</html>
