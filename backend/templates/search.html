<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results - VASTRA</title>
    <link rel="stylesheet" href="/css/shop.css" />
    <link rel="stylesheet" href="/css/navbar.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
      <link rel="stylesheet" href="/css/responsive.css" />
  </head>

  <body>
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <main>
      <h1>SEARCH RESULTS</h1>

      <div class="container">
        <section class="content">
          <div class="grid-controls">
            <input type="text" id="search-input" placeholder="Search for products..." style="padding:8px;border:1px solid #000;width:300px;">
            <span id="result-count" style="margin-left:2rem;">Searching...</span>
          </div>

          <div class="product-grid" id="search-results"></div>
        </section>
      </div>
    </main>

    <script src="/js/toast.js"></script>
    <script>
      const searchInput  = document.getElementById("search-input");
      const searchResults = document.getElementById("search-results");
      const resultCount  = document.getElementById("result-count");

      async function performSearch(query) {
        if (!query.trim()) {
          searchResults.innerHTML = '<p style="text-align:center;padding:2rem;">Enter a search term</p>';
          resultCount.textContent = "0 Results";
          return;
        }
        try {
          const res  = await fetch(`/api/products?search=${encodeURIComponent(query)}&limit=100`);
          const data = await res.json();
          if (data.success && data.products.length > 0) {
            renderResults(data.products);
            resultCount.textContent = `${data.products.length} Results for "${query}"`;
          } else {
            searchResults.innerHTML = '<p style="text-align:center;padding:2rem;color:#999;">No products found</p>';
            resultCount.textContent = '0 Results';
          }
        } catch (err) {
          searchResults.innerHTML = '<p style="text-align:center;color:red;">Search failed</p>';
        }
      }

      function renderResults(products) {
        searchResults.innerHTML = products.map((p) => `
          <div class="product-card" style="cursor:pointer;" onclick="window.location.href='/detail?id=${p._id}'">
            <img src="${p.image}" loading="lazy" class="product-img" onerror="this.src='/images/no-image.svg'">
            <p class="name">${p.name}</p>
            <p class="price">$${p.price}</p>
            <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCartShared('${p._id}','${p.name}',${p.price},'${p.image}')">
              ADD TO BAG
            </button>
          </div>`).join("");
      }

      searchInput.addEventListener("input", (e) => performSearch(e.target.value));

      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get("q");
      if (query) { searchInput.value = query; performSearch(query); }
    </script>
    <script src="/js/footer.js"></script>
  </body>
</html>
