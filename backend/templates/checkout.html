<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="/css/checkout.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <script src="/js/checkout.js"></script>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
      <link rel="stylesheet" href="/css/responsive.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <div class="container">
      <h1>CHECKOUT</h1>

      <div class="checkout-wrapper">
        <!-- LEFT SIDE -->
        <div class="form-section">
          <h2>SHIPPING INFO</h2>

          <label>First name</label>
          <input type="text" id="checkout-firstname" placeholder="First name" />

          <label>Last name</label>
          <input type="text" id="checkout-lastname" placeholder="Last name" />

          <label>Email *</label>
          <input type="email" id="checkout-email" />

          <div class="row">
            <div>
              <label>Address</label>
              <input type="text" id="checkout-address" />
            </div>

            <div>
              <label>City</label>
              <select id="checkout-city">
                <option>Surat</option>
                <option>Ahmedabad</option>
                <option>Vadodara</option>
              </select>
            </div>
          </div>

          <label>Phone</label>
          <input type="text" id="checkout-phone" />

          <div class="options" id="payment-options">
            <p class="payment-title">PAYMENT METHOD</p>
            <div class="payment-methods" role="radiogroup" aria-label="Payment Method">
              <label class="payment-option">
                <input type="radio" name="payment-method" value="COD" checked />
                <span class="payment-option-text">Cash on Delivery</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment-method" value="UPI" />
                <span class="payment-option-text">UPI</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment-method" value="PAYTM" />
                <span class="payment-option-text">Paytm</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment-method" value="GPAY" />
                <span class="payment-option-text">Google Pay (GPay)</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="payment-method" value="PHONEPE" />
                <span class="payment-option-text">PhonePe</span>
              </label>
            </div>
            <small id="cod-rule-note" class="cod-rule-note">COD available only up to configured amount.</small>
          </div>

          <div id="checkout-status" style="font-size:13px;color:#555;margin-top:8px;"></div>
          <button class="checkout-btn">CHECKOUT</button>
        </div>

        <!-- RIGHT SIDE -->
        <div class="summary-section">
          <h2>ORDER SUMMARY</h2>

          <p>Subtotal <span id="sum-subtotal">Rs. 0</span></p>
          <p>Shipping <span id="sum-shipping">Rs. 0</span></p>
          <p id="cod-charge-row" style="display:none;">COD Charge <span id="sum-cod-charge">Rs. 0</span></p>
          <p>Promo Discount <span id="sum-discount">Rs. 0</span></p>
          <p>Tax <span id="sum-tax">Rs. 0</span></p>

          <h3>Total <span id="sum-total">Rs. 0</span></h3>

          <h2>PAYMENTS</h2>

          <div class="payments">
            <i class="fa-brands fa-cc-visa"></i>
            <i class="fa-brands fa-cc-mastercard"></i>
            <i class="fa-brands fa-cc-amex"></i>
            <i class="fa-brands fa-cc-paypal"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- NAVBAR JS -->
    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
  </body>
</html>
