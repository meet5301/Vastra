<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="/css/checkout.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <script src="/js/checkout.js"></script>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <div class="container">
      <h1>CHECKOUT</h1>

      <div class="checkout-wrapper">
        <!-- LEFT SIDE -->
        <div class="form-section">
          <h2>SHIPPING INFO</h2>

          <label>First name</label>
          <input type="text" id="checkout-firstname" placeholder="First name" />

          <label>Last name</label>
          <input type="text" id="checkout-lastname" placeholder="Last name" />

          <label>Email *</label>
          <input type="email" id="checkout-email" />

          <div class="row">
            <div>
              <label>Address</label>
              <input type="text" id="checkout-address" />
            </div>

            <div>
              <label>City</label>
              <select id="checkout-city">
                <option>Surat</option>
                <option>Ahmedabad</option>
                <option>Vadodara</option>
              </select>
            </div>
          </div>

          <label>Phone</label>
          <input type="text" id="checkout-phone" />

          <div class="options">
            <label><input type="checkbox" /> Register account</label>
            <label><input type="checkbox" checked /> Pay on delivery</label>
          </div>

          <button class="checkout-btn">CHECKOUT</button>
        </div>

        <!-- RIGHT SIDE -->
        <div class="summary-section">
          <h2>ORDER SUMMARY</h2>

          <p>Subtotal <span>Rs. 7,450</span></p>
          <p>Shipping <span>Rs. 299</span></p>
          <p>Promo Discount <span>- Rs. 150</span></p>
          <p>Tax <span>Rs. 599</span></p>

          <h3>Total <span>Rs. 8,198</span></h3>

          <h2>PAYMENTS</h2>

          <div class="payments">
            <i class="fa-brands fa-cc-visa"></i>
            <i class="fa-brands fa-cc-mastercard"></i>
            <i class="fa-brands fa-cc-amex"></i>
            <i class="fa-brands fa-cc-paypal"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- NAVBAR JS -->
    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
  </body>
</html>
