<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories - VASTRA</title>
    <link rel="stylesheet" href="/css/shop.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/categories.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <main>
      <h1>CATEGORIES</h1>

      <div class="container">
        <section class="content">
          <div class="categories-grid">
            <!-- MEN -->
            <div class="category-card" onclick="window.location.href='/men'">
              <div class="category-card-image">
                <i class="fas fa-shirt"></i>
              </div>
              <h3>MEN</h3>
              <p>Explore our collection of premium men's clothing</p>
              <button class="category-card-btn">VIEW ALL</button>
            </div>

            <!-- WOMEN -->
            <div class="category-card" onclick="window.location.href='/women'">
              <div class="category-card-image">
                <i class="fas fa-dress"></i>
              </div>
              <h3>WOMEN</h3>
              <p>Discover elegant women's fashion essentials</p>
              <button class="category-card-btn">VIEW ALL</button>
            </div>

            <!-- ACCESSORIES -->
            <div class="category-card" onclick="window.location.href='/accessories'">
              <div class="category-card-image">
                <i class="fas fa-ring"></i>
              </div>
              <h3>ACCESSORIES</h3>
              <p>Complete your look with our accessories range</p>
              <button class="category-card-btn">VIEW ALL</button>
      </div>
    </main>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
  </body>
</html>
