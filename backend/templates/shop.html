<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — VASTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
      <link rel="stylesheet" href="/css/responsive.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <script src="/js/navbar.js"></script>

    <!-- SHOP HEADER BANNER -->
    <div class="shop-hero" style="background-image:url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&h=500&fit=crop&q=90');">
      <div class="shop-hero-content">
        <p class="shop-hero-tag"><span class="gold-line"></span> VASTRA COLLECTION <span class="gold-line"></span></p>
        <h1 class="shop-hero-title">NEW ARRIVALS</h1>
        <p class="shop-hero-sub">Premium fashion — curated for the modern wardrobe</p>
      </div>
    </div>

    <!-- ACTIVE FILTERS BAR -->
    <div class="active-filters-bar" id="active-filters-bar" style="display:none;">
      <span class="af-label">FILTERS:</span>
      <div class="af-tags" id="af-tags"></div>
      <button class="af-clear" id="af-clear">CLEAR ALL</button>
    </div>

    <div class="shop-layout">

      <!-- SIDEBAR -->
      <aside class="shop-sidebar" id="shop-sidebar">
        <div class="sidebar-header">
          <h2>FILTERS</h2>
          <button class="sidebar-close" id="sidebar-close"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Search -->
        <div class="filter-block">
          <div class="shop-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="shop-search-input" placeholder="Search products..." />
          </div>
        </div>

        <!-- Category -->
        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('cat')">
            <h4>CATEGORY</h4>
            <i class="fa-solid fa-chevron-down" id="cat-icon"></i>
          </div>
          <div class="filter-block-body" id="cat-body">
            <label class="filter-radio"><input type="radio" name="category" value="All" checked /> <span>All</span></label>
            <label class="filter-radio"><input type="radio" name="category" value="Men" /> <span>Men</span></label>
            <label class="filter-radio"><input type="radio" name="category" value="Women" /> <span>Women</span></label>
            <label class="filter-radio"><input type="radio" name="category" value="Accessories" /> <span>Accessories</span></label>
          </div>
        </div>

        <!-- Price Range -->
        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('price')">
            <h4>PRICE RANGE</h4>
            <i class="fa-solid fa-chevron-down" id="price-icon"></i>
          </div>
          <div class="filter-block-body" id="price-body">
            <div class="range-pair">
              <label>Min: <span id="price-min-value">0</span></label>
              <input type="range" id="price-min" min="0" max="50000" step="100" value="0" />
              <label>Max: <span id="price-max-value">50000</span></label>
              <input type="range" id="price-max" min="0" max="50000" step="100" value="50000" />
            </div>
          </div>
        </div>

        <!-- Brand Chips -->
        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('brand')">
            <h4>BRAND</h4>
            <i class="fa-solid fa-chevron-down" id="brand-icon"></i>
          </div>
          <div class="filter-block-body" id="brand-body">
            <div class="chip-list" id="brand-chip-list"></div>
          </div>
        </div>

        <!-- Sub Category -->
        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('sub')">
            <h4>TYPE</h4>
            <i class="fa-solid fa-chevron-down" id="sub-icon"></i>
          </div>
          <div class="filter-block-body" id="sub-body">
            <div id="sub-category-list"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('size')">
            <h4>SIZE</h4>
            <i class="fa-solid fa-chevron-down" id="size-icon"></i>
          </div>
          <div class="filter-block-body" id="size-body">
            <div id="size-list"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('color')">
            <h4>COLOR</h4>
            <i class="fa-solid fa-chevron-down" id="color-icon"></i>
          </div>
          <div class="filter-block-body" id="color-body">
            <div id="color-list"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('material')">
            <h4>MATERIAL</h4>
            <i class="fa-solid fa-chevron-down" id="material-icon"></i>
          </div>
          <div class="filter-block-body" id="material-body">
            <div id="material-list"></div>
          </div>
        </div>

        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('fit')">
            <h4>FIT</h4>
            <i class="fa-solid fa-chevron-down" id="fit-icon"></i>
          </div>
          <div class="filter-block-body" id="fit-body">
            <div id="fit-list"></div>
          </div>
        </div>

        <!-- Rating -->
        <div class="filter-block">
          <div class="filter-block-header" onclick="toggleFilter('rating')">
            <h4>RATING</h4>
            <i class="fa-solid fa-chevron-down" id="rating-icon"></i>
          </div>
          <div class="filter-block-body" id="rating-body">
            <label class="filter-radio"><input type="radio" name="rating" value="" checked /> <span>All Ratings</span></label>
            <label class="filter-radio"><input type="radio" name="rating" value="4" /> <span>★★★★☆ 4+ Stars</span></label>
            <label class="filter-radio"><input type="radio" name="rating" value="3" /> <span>★★★☆☆ 3+ Stars</span></label>
          </div>
        </div>

        <button class="apply-filters-btn" onclick="applyFilters()">APPLY FILTERS</button>
      </aside>

      <!-- OVERLAY for mobile sidebar -->
      <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

      <!-- MAIN CONTENT -->
      <main class="shop-main">

        <!-- TOP BAR -->
        <div class="shop-topbar">
          <div class="topbar-left">
            <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="openSidebar()">
              <i class="fa-solid fa-sliders"></i> FILTERS
            </button>
            <span class="result-count" id="result-count">Loading...</span>
          </div>
          <div class="topbar-right">
            <div class="sort-wrap">
              <label>SORT BY</label>
              <select id="sort-select">
                <option value="">Recommended</option>
                <option value="newest">Newest First</option>
                <option value="popular">Most Popular</option>
                <option value="discount">Best Discount</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="rating">Top Rated</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" id="view-grid" onclick="setView('grid')"><i class="fa-solid fa-grip"></i></button>
              <button class="view-btn" id="view-list" onclick="setView('list')"><i class="fa-solid fa-list"></i></button>
            </div>
          </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="product-grid"></div>

        <!-- PAGINATION -->
        <div class="pagination-wrap" id="pagination-wrap"></div>

      </main>
    </div>

    <script src="/js/toast.js"></script>
    <script src="/js/shop.js"></script>
    <script src="/js/footer.js"></script>

    <script>
      // Filter toggle
      function toggleFilter(id) {
        const body = document.getElementById(id + '-body');
        const icon = document.getElementById(id + '-icon');
        body.classList.toggle('collapsed');
        icon.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : 'rotate(0)';
      }

      // Mobile sidebar
      function openSidebar() {
        document.getElementById('shop-sidebar').classList.add('open');
        document.getElementById('sidebar-overlay').classList.add('show');
      }
      function closeSidebar() {
        document.getElementById('shop-sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      }
      document.getElementById('sidebar-close').addEventListener('click', closeSidebar);

      // View toggle
      function setView(v) {
        const grid = document.getElementById('product-grid');
        grid.className = 'product-grid' + (v === 'list' ? ' list-view' : '');
        document.getElementById('view-grid').classList.toggle('active', v === 'grid');
        document.getElementById('view-list').classList.toggle('active', v === 'list');
      }

      // Apply filters — triggers shop.js reload
      function applyFilters() {
        closeSidebar();
        if (typeof loadProducts === 'function') loadProducts();
      }
    </script>
  </body>
</html>
