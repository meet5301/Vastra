<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders - VASTRA Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>VASTRA.</h1><span>ADMIN PANEL</span></div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        DASHBOARD
      </a>
      <a href="/admin/products">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        PRODUCTS
      </a>
      <a href="/admin/orders" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        ORDERS
      </a>
      <a href="/admin/users">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        USERS
      </a>
    </nav>
    <div class="sidebar-bottom"><button onclick="adminLogout()">LOGOUT</button></div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <h2>ORDERS</h2>
    </div>

    <div class="page-content">
      <div class="filter-bar">
        <select id="status-filter" onchange="loadOrders()">
          <option value="">All Status</option>
          <option>Processing</option>
          <option>Confirmed</option>
          <option>Shipped</option>
          <option>Delivered</option>
          <option>Cancelled</option>
        </select>
      </div>

      <div class="table-section">
        <div class="table-header">
          <h3>ALL ORDERS <span id="order-count" style="color:#888;font-size:12px;"></span></h3>
        </div>
        <table>
          <thead>
            <tr>
              <th>ORDER ID</th>
              <th>CUSTOMER</th>
              <th>ITEMS</th>
              <th>TOTAL</th>
              <th>PAYMENT</th>
              <th>STATUS</th>
              <th>DATE</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="8" style="text-align:center;padding:2rem;color:#888;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="width:640px;">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>ORDER DETAIL</h2>
    <div id="order-detail-content"></div>
  </div>
</div>

<div id="admin-toast"></div>

<script>
  const token = localStorage.getItem("vastra_admin_token");
  if (!token) window.location.href = "/admin";

  function adminLogout() {
    localStorage.removeItem("vastra_admin_token");
    localStorage.removeItem("vastra_admin_user");
    window.location.href = "/admin";
  }
  function authHeaders() {
    return { "Content-Type": "application/json", Authorization: `Bearer ${token}` };
  }
  function toast(msg) {
    const t = document.getElementById("admin-toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
  }
  function statusBadge(s) {
    return `<span class="badge badge-${s.toLowerCase()}">${s.toUpperCase()}</span>`;
  }

  async function loadOrders() {
    const status = document.getElementById("status-filter").value;
    const url = `/api/orders/admin/all?limit=50${status ? "&status=" + status : ""}`;
    try {
      const res = await fetch(url, { headers: authHeaders() });
      const data = await res.json();
      const tbody = document.getElementById("orders-tbody");
      document.getElementById("order-count").textContent = `(${data.total || 0})`;

      if (!data.orders?.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#888;">No orders found.</td></tr>';
        return;
      }

      tbody.innerHTML = data.orders.map(o => `
        <tr>
          <td style="font-family:monospace;font-size:12px;">#${o._id.slice(-8).toUpperCase()}</td>
          <td>${o.user?.username || o.guestInfo?.firstName + " " + (o.guestInfo?.lastName || "") || "Guest"}<br>
              <span style="font-size:11px;color:#888;">${o.user?.email || o.guestInfo?.email || ""}</span></td>
          <td>${o.items.length}</td>
          <td>$${o.totalAmount.toFixed(2)}</td>
          <td><span class="badge badge-${o.paymentStatus.toLowerCase()}">${o.paymentStatus}</span></td>
          <td>${statusBadge(o.orderStatus)}</td>
          <td>${new Date(o.createdAt).toLocaleDateString("en-IN")}</td>
          <td style="display:flex;gap:4px;padding-top:14px;">
            <button class="btn btn-outline btn-sm" onclick="viewOrder('${o._id}')">VIEW</button>
            <select onchange="updateStatus('${o._id}', this.value)" style="padding:4px;border:1px solid #ddd;font-size:11px;cursor:pointer;">
              <option value="">Update</option>
              <option>Processing</option>
              <option>Confirmed</option>
              <option>Shipped</option>
              <option>Delivered</option>
              <option>Cancelled</option>
            </select>
          </td>
        </tr>`).join("");
    } catch (err) {
      document.getElementById("orders-tbody").innerHTML = '<tr><td colspan="8" style="text-align:center;color:red;">Failed to load.</td></tr>';
    }
  }

  async function updateStatus(id, status) {
    if (!status) return;
    try {
      const res = await fetch(`/api/orders/admin/${id}/status`, {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify({ orderStatus: status }),
      });
      const data = await res.json();
      if (data.success) { toast(`Status updated to ${status}`); loadOrders(); }
    } catch (err) { alert("Error updating status"); }
  }

  async function viewOrder(id) {
    try {
      const res = await fetch(`/api/orders/${id}`, { headers: authHeaders() });
      const data = await res.json();
      if (!data.success) return;
      const o = data.order;
      document.getElementById("order-detail-content").innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
          <div>
            <p style="font-size:11px;color:#888;letter-spacing:1px;">ORDER ID</p>
            <p style="font-family:monospace;">#${o._id.slice(-8).toUpperCase()}</p>
          </div>
          <div>
            <p style="font-size:11px;color:#888;letter-spacing:1px;">DATE</p>
            <p>${new Date(o.createdAt).toLocaleString("en-IN")}</p>
          </div>
          <div>
            <p style="font-size:11px;color:#888;letter-spacing:1px;">CUSTOMER</p>
            <p>${o.guestInfo?.firstName || ""} ${o.guestInfo?.lastName || ""}</p>
            <p style="font-size:12px;color:#888;">${o.guestInfo?.email || ""} · ${o.guestInfo?.phone || ""}</p>
          </div>
          <div>
            <p style="font-size:11px;color:#888;letter-spacing:1px;">SHIPPING TO</p>
            <p>${o.shippingAddress?.address}, ${o.shippingAddress?.city}</p>
          </div>
        </div>
        <h3 style="letter-spacing:2px;font-size:12px;margin-bottom:1rem;">ITEMS</h3>
        ${o.items.map(i => `
          <div style="display:flex;align-items:center;gap:1rem;padding:8px 0;border-bottom:1px solid #f5f5f5;">
            <img src="${i.image}" style="width:50px;height:60px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/50'">
            <div style="flex:1;"><p>${i.name}</p><p style="font-size:12px;color:#888;">Size: ${i.size} · Qty: ${i.quantity}</p></div>
            <p>$${(i.price * i.quantity).toFixed(2)}</p>
          </div>`).join("")}
        <div style="margin-top:1rem;padding-top:1rem;border-top:2px solid #000;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Subtotal</span><span>$${o.subtotal?.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>Shipping</span><span>$${o.shippingCost?.toFixed(2)}</span></div>
          <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;"><span>TOTAL</span><span>$${o.totalAmount?.toFixed(2)}</span></div>
        </div>`;
      document.getElementById("order-modal").classList.add("open");
    } catch (err) { alert("Failed to load order"); }
  }

  function closeModal() {
    document.getElementById("order-modal").classList.remove("open");
  }

  loadOrders();
</script>
</body>
</html>
